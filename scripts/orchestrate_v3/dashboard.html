<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orchestrator Dashboard</title>
<!-- Font Awesome 6 Free -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<!-- Marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<!-- External stylesheet -->
<link rel="stylesheet" href="/api/static/dashboard.css">
</head>
<body>

<div class="header">
  <h1 id="plan-title">Loading...</h1>
  <div class="meta">
    <span id="wave-info">Wave -/-</span>
    <span id="progress-text">0/0 segments</span>
    <span id="elapsed">Elapsed: --</span>
    <span id="eta-text" style="color: var(--partial);"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="layout">
  <div class="timeline" id="timeline">
    <div id="timeline-content"></div>
    <div class="kbd-hint">
      <kbd>j</kbd>/<kbd>k</kbd> navigate &nbsp; <kbd>Enter</kbd> open log
    </div>
  </div>

  <div class="log-panel">
    <div class="log-header">
      <span>LOG: <span id="log-seg-label">select a segment</span></span>
      <div class="log-header-right">
        <div class="token-cost-display" id="token-cost-display"></div>
        <span class="live-badge" id="live-badge"></span>
      </div>
    </div>
    <div class="log-content" id="log-content"></div>
    <div class="log-bottom-toolbar">
      <input
        type="text"
        id="interject-input"
        class="toolbar-interject-input"
        placeholder="Enter interject message (resets segment to pending)..."
        maxlength="2000"
        disabled
        onkeydown="if(event.key==='Enter' && !this.disabled) interjectCurrentSeg()"
      >
      <button class="toolbar-interject-btn" id="interject-btn" onclick="interjectCurrentSeg()" disabled>
        <i class="fa-solid fa-message"></i> Send
      </button>
      <div class="toolbar-divider"></div>
      <button class="prompt-btn" id="prompt-btn" onclick="showPrompt()" disabled>Prompt</button>
    </div>
  </div>

  <div class="events">
    <div class="events-inner">
      <div class="events-col">
        <h3>Event Feed</h3>
        <div id="event-feed"></div>
      </div>
      <div class="events-col" id="notif-col">
        <h3>Notifications</h3>
        <div id="notif-feed"></div>
      </div>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="timeline" onclick="switchTab('timeline')">
    <i class="fa-solid fa-list"></i><span>Timeline</span>
  </button>
  <button class="tab-btn" data-tab="events" onclick="switchTab('events')">
    <i class="fa-solid fa-bell"></i><span>Events</span>
  </button>
</div>

<script>
(function() {
  let activeSeg = null;
  let logSource = null;
  let eventSource = null;
  let startedAt = null;
  let lastSegments = null;
  let activeSegList = [];

  // Prompt view state
  let showingPrompt = false;
  let currentPromptText = null;

  // Restore from localStorage
  const savedSeg = parseInt(localStorage.getItem('orchestrate_activeSeg'));
  if (savedSeg) activeSeg = savedSeg;

  function pad(n) { return String(n).padStart(2, '0'); }

  function formatElapsed(sec) {
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60);
    return h > 0 ? `${h}h ${pad(m)}m` : `${m}m ${pad(s)}s`;
  }

  function formatTs(epoch) {
    const d = new Date(epoch * 1000);
    return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  function waveStatus(segs) {
    if (segs.some(s => s.status === 'running')) return 'active';
    if (segs.every(s => ['pass','partial','blocked','failed','timeout'].includes(s.status))) return 'done';
    return 'pending';
  }

  function gateStatus(events, waveNum, currentWave, waveIsDone) {
    for (const ev of events) {
      if (ev.kind === 'gate_result' && ev.detail.includes(`Wave ${waveNum}`)) {
        return ev.detail.includes('PASS') ? 'pass' : 'fail';
      }
    }
    // Only show running if this wave is done AND we're still on this wave (not moved to next)
    if (waveIsDone && parseInt(currentWave) === waveNum) return 'running';
    return 'pending';
  }

  function computeEta(segments, maxParallel) {
    const done = segments.filter(s => s.finished_at && s.started_at);
    if (done.length < 2) return '';
    const avg = done.reduce((s, seg) => s + (seg.finished_at - seg.started_at), 0) / done.length;
    const pending = segments.filter(s => ['pending','running'].includes(s.status)).length;
    const etaSec = avg * pending / Math.max(maxParallel || 1, 1);
    return etaSec > 30 ? `ETA: ~${formatElapsed(etaSec)}` : '';
  }

  // ── Claude Code-style log renderer ──────────────────────────────────────
  // Pending tool blocks waiting for their result event (keyed by arrival order).
  let _pendingTools = [];   // stack of {el, bodyEl, resultEl} for open tool blocks
  let _textDeltaBuf = '';
  let _thinkDeltaBuf = '';
  let _thinkEl = null;      // current open thinking block DOM node

  function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function _parseYamlFrontmatter(text) {
    // Extract YAML frontmatter from markdown (---\n...\n---)
    const match = text.match(/^---\n([\s\S]*?)\n---\n/);
    if (!match) return { metadata: {}, content: text };

    const yamlBlock = match[1];
    const content = text.slice(match[0].length);
    const metadata = {};

    // Simple YAML parser for key: value pairs
    yamlBlock.split('\n').forEach(line => {
      const colonIdx = line.indexOf(':');
      if (colonIdx > 0) {
        const key = line.slice(0, colonIdx).trim();
        let value = line.slice(colonIdx + 1).trim();

        // Parse arrays [1,2,3] or [a, b, c]
        if (value.startsWith('[') && value.endsWith(']')) {
          value = value.slice(1, -1).split(',').map(v => v.trim()).filter(v => v);
        }

        metadata[key] = value;
      }
    });

    return { metadata, content };
  }

  function _renderMetadataPills(metadata) {
    // Render segment metadata as pills at the top of the prompt view
    const pills = [];
    const fieldOrder = ['segment', 'title', 'depends_on', 'risk', 'complexity', 'cycle_budget', 'estimated_lines'];

    fieldOrder.forEach(key => {
      if (metadata[key] !== undefined) {
        let displayValue = metadata[key];

        // Format arrays as comma-separated
        if (Array.isArray(displayValue)) {
          displayValue = `[${displayValue.join(', ')}]`;
        }

        pills.push(`<span style="display: inline-block; background: rgba(122,162,247,0.15); color: var(--cc-blue); border: 1px solid rgba(122,162,247,0.3); border-radius: 4px; padding: 4px 10px; margin: 0 6px 6px 0; font-size: 11.5px; font-weight: 500;"><span style="color: var(--cc-text-dim);">${_esc(key)}:</span> ${_esc(displayValue)}</span>`);
      }
    });

    if (pills.length === 0) return '';

    return `<div style="margin-bottom: 16px; display: flex; flex-wrap: wrap; align-items: center;">${pills.join('')}</div>`;
  }

  function _renderMarkdown(text) {
    // Use marked.js for proper markdown rendering
    return marked.parse(text, {
      breaks: false,
      gfm: true,
      headerIds: false,
      mangle: false
    });
  }

  function _flushTextDelta(logEl) {
    if (!_textDeltaBuf) return;
    _appendTextNode(logEl, _textDeltaBuf);
    _textDeltaBuf = '';
  }

  function _flushThinkDelta(logEl) {
    if (!_thinkDeltaBuf) return;
    _buildThinkingBlock(logEl, _thinkDeltaBuf);
    _thinkDeltaBuf = '';
    _thinkEl = null;
  }

  function _appendTextNode(logEl, text, isMarkdown = false) {
    if (!text.trim()) return;
    const div = document.createElement('div');
    div.className = isMarkdown ? 'cc-text markdown' : 'cc-text';
    if (isMarkdown) {
      div.innerHTML = _renderMarkdown(text);
    } else {
      div.textContent = text;
    }
    logEl.appendChild(div);
  }

  function _buildThinkingBlock(logEl, text) {
    const wrap = document.createElement('div');
    wrap.className = 'cc-thinking';
    const hdr = document.createElement('div');
    hdr.className = 'cc-thinking-header';
    hdr.innerHTML = `<span class="cc-thinking-chevron">&#9654;</span> thinking`;
    const body = document.createElement('div');
    body.className = 'cc-thinking-body';
    body.textContent = text;
    hdr.onclick = () => wrap.classList.toggle('open');
    wrap.appendChild(hdr);
    wrap.appendChild(body);
    logEl.appendChild(wrap);
    return wrap;
  }

  function _buildToolBlock(logEl, name, preview, isError) {
    const wrap = document.createElement('div');
    wrap.className = 'cc-tool';
    const hdr = document.createElement('div');
    hdr.className = 'cc-tool-header';
    const dot = document.createElement('span');
    dot.className = 'cc-tool-dot' + (isError ? ' error' : '');
    const nameEl = document.createElement('span');
    nameEl.className = 'cc-tool-name';
    nameEl.textContent = name;
    const prev = document.createElement('span');
    prev.className = 'cc-tool-preview';
    prev.textContent = preview || '';
    const chev = document.createElement('span');
    chev.className = 'cc-tool-chevron';
    chev.innerHTML = '&#9654;';
    hdr.appendChild(dot);
    hdr.appendChild(nameEl);
    hdr.appendChild(prev);
    hdr.appendChild(chev);
    hdr.onclick = () => wrap.classList.toggle('open');

    const body = document.createElement('div');
    body.className = 'cc-tool-body';
    wrap.appendChild(hdr);
    wrap.appendChild(body);
    logEl.appendChild(wrap);
    return { wrap, body, dotEl: dot, prevEl: prev };
  }

  function appendLogEvent(logEl, event) {
    const t = event.type;

    // ── Streaming deltas ──
    if (t === 'text_delta') {
      _flushThinkDelta(logEl);
      _textDeltaBuf += event.text;
      logEl.scrollTop = logEl.scrollHeight;
      return;
    }
    if (t === 'thinking_delta') {
      _flushTextDelta(logEl);
      _thinkDeltaBuf += event.text;
      return;
    }

    // Flush buffered deltas before any block-level event
    _flushTextDelta(logEl);
    _flushThinkDelta(logEl);

    if (t === '_switch_to_log') {
      const d = document.createElement('div');
      d.className = 'cc-divider';
      d.textContent = 'segment complete';
      logEl.appendChild(d);

    } else if (t === 'text') {
      _appendTextNode(logEl, event.text);

    } else if (t === 'thinking') {
      _buildThinkingBlock(logEl, event.text);

    } else if (t === 'tool_start') {
      // Streaming: tool open, no input yet
      const { wrap, body, dotEl, prevEl } = _buildToolBlock(logEl, event.name, '…');
      _pendingTools.push({ wrap, body, dotEl, prevEl, name: event.name });

    } else if (t === 'tool_use') {
      // Batched: full tool call with summary
      const { wrap, body, dotEl, prevEl } = _buildToolBlock(logEl, event.name, event.summary);
      // Show input section
      const inp = document.createElement('div');
      inp.className = 'cc-tool-input';
      inp.innerHTML = `<div class="cc-label">Input</div>${_esc(event.summary)}`;
      body.appendChild(inp);
      _pendingTools.push({ wrap, body, dotEl, prevEl, name: event.name });

    } else if (t === 'tool_result') {
      const pending = _pendingTools.pop();
      if (pending) {
        const isErr = event.is_error;
        if (isErr) pending.dotEl.classList.add('error');
        const res = document.createElement('div');
        res.className = 'cc-tool-result' + (isErr ? ' error' : '');
        const lbl = document.createElement('div');
        lbl.className = 'cc-label';
        lbl.textContent = isErr ? 'Error' : 'Result';
        res.appendChild(lbl);
        res.appendChild(document.createTextNode(event.text || ''));
        pending.body.appendChild(res);
        // Update preview to show brief result summary
        const firstLine = (event.text || '').split('\n')[0].slice(0, 60);
        pending.prevEl.textContent = firstLine || (isErr ? 'error' : 'done');
        // Auto-open on error
        if (isErr) pending.wrap.classList.add('open');
      } else {
        // Orphan result — no matching tool_use, render standalone
        const res = document.createElement('div');
        res.className = 'cc-tool-result' + (event.is_error ? ' error' : '');
        res.textContent = event.text || '';
        logEl.appendChild(res);
      }

    } else if (t === 'result') {
      const isOk = event.subtype === 'success';
      const el = document.createElement('div');
      el.className = `cc-result ${event.subtype || 'unknown'}`;
      let inner = `<span>${isOk ? '&#10003;' : '&#10007;'} ${_esc(event.subtype || 'done')}</span>`;
      if (event.cost != null) {
        const usage = event.usage || {};
        const tok = usage.output_tokens ? ` &middot; ${usage.input_tokens||0}in ${usage.output_tokens}out` : '';
        inner += `<span class="cc-cost">$${Number(event.cost).toFixed(3)}${tok}</span>`;
      }
      el.innerHTML = inner;
      logEl.appendChild(el);
    }

    logEl.scrollTop = logEl.scrollHeight;
  }

  // Legacy plain-text helper (kept for compat)
  function appendLogLine(logEl, text) {
    appendLogEvent(logEl, { type: 'text', text });
  }

  // ── Tab switching ──
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelector('.timeline').classList.toggle('tab-active', tab === 'timeline');
    document.querySelector('.events').classList.toggle('tab-active', tab === 'events');
  }


  // ── Segment navigation ──
  function selectNext() {
    const idx = activeSegList.indexOf(activeSeg);
    if (activeSegList.length === 0) return;
    const next = activeSegList[idx < 0 ? 0 : Math.min(idx + 1, activeSegList.length - 1)];
    const seg = lastSegments && lastSegments.find(s => s.num === next);
    if (seg) window._selectSeg(seg.num, seg.title, seg.status);
  }

  function selectPrev() {
    const idx = activeSegList.indexOf(activeSeg);
    if (activeSegList.length === 0) return;
    const prev = activeSegList[idx <= 0 ? 0 : idx - 1];
    const seg = lastSegments && lastSegments.find(s => s.num === prev);
    if (seg) window._selectSeg(seg.num, seg.title, seg.status);
  }

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', function(e) {
    if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) {
      if (e.key === 'Escape') {
        e.target.blur();
      }
      return;
    }
    if (e.key === 'j') { e.preventDefault(); selectNext(); }
    if (e.key === 'k') { e.preventDefault(); selectPrev(); }
    if (e.key === 'Enter' && activeSeg != null) {
      const seg = lastSegments && lastSegments.find(s => s.num === activeSeg);
      if (seg) window._selectSeg(seg.num, seg.title, seg.status);
    }
  });

  // ── Notifications ──
  function renderNotifications(notifs) {
    const el = document.getElementById('notif-feed');
    if (!el || !notifs || !notifs.length) return;
    let html = '';
    notifs.forEach(n => {
      const icon = n.sent_at ? '<i class="fa-solid fa-check" style="color: var(--pass)"></i>' : (n.attempts >= 3 ? '<i class="fa-solid fa-xmark" style="color: var(--fail)"></i>' : '<i class="fa-solid fa-clock" style="color: var(--text-dim)"></i>');
      const ts = n.sent_at ? formatTs(n.sent_at) : `${n.attempts} att.`;
      const preview = (n.message || '').split('\n')[0].slice(0, 60);
      html += `<div class="notif-line">${icon} <span class="ts">${ts}</span><span class="kind">${n.kind}</span> ${preview}</div>`;
    });
    el.innerHTML = html;
  }

  // ── State refresh ──
  function refreshState() {
    fetch('/api/state')
      .then(r => r.json())
      .then(data => {
        document.getElementById('plan-title').textContent = data.plan_title || 'Orchestrator';
        document.getElementById('wave-info').textContent = `Wave ${data.current_wave}/${data.max_wave}`;

        const total = data.segments.length;
        const doneCount = data.segments.filter(s => ['pass','merged','partial','blocked','failed','timeout'].includes(s.status)).length;
        const runningCount = data.segments.filter(s => s.status === 'running').length;
        document.getElementById('progress-text').textContent = `${doneCount}/${total} done` + (runningCount ? ` · ${runningCount} running` : '');
        document.getElementById('progress-fill').style.width = total ? `${(doneCount/total*100).toFixed(1)}%` : '0%';

        if (data.started_at) startedAt = parseFloat(data.started_at);

        // ETA
        const eta = computeEta(data.segments, data.max_parallel || 4);
        document.getElementById('eta-text').textContent = eta;

        renderTimeline(data.segments, data.max_wave, data.events || [], data.current_wave);
        lastSegments = data.segments;

        // Update token/cost display if active segment
        if (activeSeg != null) {
          updateTokenCostDisplay(activeSeg);
        }

        // Update interject UI state if active segment status changed
        if (activeSeg != null) {
          const activeSgment = data.segments.find(s => s.num === activeSeg);
          if (activeSgment) {
            const canInterject = ['running', 'failed', 'partial', 'blocked', 'timeout', 'unknown'].includes(activeSgment.status);
            const interjectBtn = document.getElementById('interject-btn');
            const interjectInput = document.getElementById('interject-input');
            if (interjectBtn) {
              interjectBtn.disabled = !canInterject;
            }
            if (interjectInput) {
              interjectInput.disabled = !canInterject;
            }
          }
        }

        // Auto-select first running segment only if nothing selected yet
        if (activeSeg == null) {
          const running = data.segments.find(s => s.status === 'running');
          if (running) window._selectSeg(running.num, running.title, 'running');
        }

        renderNotifications(data.notifications);
      })
      .catch(() => {});
  }

  function statusIcon(status) {
    const icons = {
      'pass': '<i class="fa-solid fa-check-circle"></i>',
      'running': '<i class="fa-solid fa-spinner fa-spin"></i>',
      'pending': '<i class="fa-regular fa-circle"></i>',
      'failed': '<i class="fa-solid fa-times-circle"></i>',
      'partial': '<i class="fa-solid fa-exclamation-triangle"></i>',
      'blocked': '<i class="fa-solid fa-ban"></i>',
      'timeout': '<i class="fa-solid fa-clock"></i>',
      'skipped': '<i class="fa-solid fa-forward"></i>',
      'unknown': '<i class="fa-solid fa-question-circle"></i>'
    };
    return icons[status] || icons['unknown'];
  }

  function actionButtons(seg) {
    const btns = [];
    if (seg.status === 'running') {
      btns.push(`<button class="act-btn act-kill" onclick="event.stopPropagation();controlSeg(${seg.num},'kill')" title="Kill process"><i class="fa-solid fa-stop"></i> Kill</button>`);
    }
    if (['failed','blocked','partial','timeout'].includes(seg.status)) {
      btns.push(`<button class="act-btn act-retry" onclick="event.stopPropagation();controlSeg(${seg.num},'retry')" title="Retry"><i class="fa-solid fa-rotate-right"></i> Retry</button>`);
      btns.push(`<button class="act-btn act-skip" onclick="event.stopPropagation();controlSeg(${seg.num},'skip')" title="Skip"><i class="fa-solid fa-forward"></i> Skip</button>`);
    }
    if (seg.status === 'pending') {
      btns.push(`<button class="act-btn act-skip" onclick="event.stopPropagation();controlSeg(${seg.num},'skip')" title="Skip"><i class="fa-solid fa-forward"></i> Skip</button>`);
    }
    return btns.length ? `<span class="act-btns">${btns.join('')}</span>` : '';
  }

  window.controlSeg = async function(num, action) {
    const messages = {
      kill:  `Kill S${String(num).padStart(2,'0')}? This terminates the running process.`,
      retry: `Reset S${String(num).padStart(2,'0')} for retry? (Restart orchestrator to run it.)`,
      skip:  `Skip S${String(num).padStart(2,'0')}? The wave will proceed without it.`,
    };
    if (!confirm(messages[action] || `${action} S${String(num).padStart(2,'0')}?`)) return;
    try {
      const r = await fetch('/api/control', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action, seg_num: num}),
      });
      const data = await r.json();
      if (!data.ok) {
        alert(`Failed: ${data.error || 'unknown error'}`);
      } else {
        refreshState();
      }
    } catch (e) {
      alert(`Request failed: ${e.message}`);
    }
  };

  window.interjectSeg = async function(num) {
    // Prompt for message
    const message = prompt(
      `Enter message for S${String(num).padStart(2,'0')}:\n\n` +
      `This will pause the segment and send your message to the agent.\n` +
      `Max 2000 characters.`
    );

    // Validate
    if (message === null) return; // User cancelled

    const trimmed = message.trim();
    if (!trimmed) {
      alert('Message cannot be empty.');
      return;
    }

    if (trimmed.length > 2000) {
      alert(`Message too long: ${trimmed.length} chars (max 2000)`);
      return;
    }

    // Confirm with preview
    const preview = trimmed.length > 100 ? trimmed.substring(0, 100) + '...' : trimmed;
    const confirmed = confirm(
      `Send interject message to S${String(num).padStart(2,'0')}?\n\n` +
      `Preview: "${preview}"\n\n` +
      `This will pause the segment execution.`
    );

    if (!confirmed) return;

    // Send request
    try {
      const r = await fetch('/api/control', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action: 'interject', seg_num: num, message: trimmed}),
      });
      const data = await r.json();
      if (!data.ok) {
        alert(`Failed to interject: ${data.error || 'unknown error'}`);
      } else {
        alert(`Interject message sent to S${String(num).padStart(2,'0')}`);
        refreshState();
      }
    } catch (e) {
      alert(`Request failed: ${e.message}`);
    }
  };

  window.interjectCurrentSeg = async function() {
    if (activeSeg == null) {
      alert('No segment selected');
      return;
    }

    const input = document.getElementById('interject-input');
    const message = (input ? input.value : '').trim();

    if (!message) {
      alert('Please enter a message');
      return;
    }

    if (message.length > 2000) {
      alert(`Message too long: ${message.length} chars (max 2000)`);
      return;
    }

    // Simple confirmation
    if (!confirm(`Send interject message to S${String(activeSeg).padStart(2,'0')}?\n\nThis will:\n- Kill the segment if running\n- Reset it to pending for immediate retry\n- Include your message in the next execution`)) {
      return;
    }

    // Send request
    try {
      const r = await fetch('/api/control', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action: 'interject', seg_num: activeSeg, message: message}),
      });
      const data = await r.json();
      if (!data.ok) {
        alert(`Failed to interject: ${data.error || 'unknown error'}`);
      } else {
        // Clear input on success
        if (input) input.value = '';
        alert(`Interject message sent to S${String(activeSeg).padStart(2,'0')}`);
        refreshState();
      }
    } catch (e) {
      alert(`Request failed: ${e.message}`);
    }
  };

  window.changeStatus = async function(num, newStatus) {
    try {
      const r = await fetch('/api/control', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action: 'set_status', seg_num: num, status: newStatus}),
      });
      const data = await r.json();
      if (!data.ok) {
        alert(`Failed: ${data.error || 'unknown error'}`);
      } else {
        refreshState();
      }
    } catch (e) {
      alert(`Request failed: ${e.message}`);
    }
  };

  window.toggleStatusDropdown = function(event, num, currentStatus) {
    event.stopPropagation();
    // Close any open dropdowns
    document.querySelectorAll('.status-dropdown').forEach(d => d.remove());

    const statuses = ['pending', 'running', 'pass', 'merged', 'failed', 'blocked', 'partial', 'timeout', 'unknown', 'skipped'];
    const dropdown = document.createElement('div');
    dropdown.className = 'status-dropdown show';

    statuses.forEach(status => {
      const item = document.createElement('div');
      item.className = 'status-dropdown-item';
      item.textContent = status;
      item.style.color = getComputedStyle(document.documentElement).getPropertyValue(`--${status === 'pass' ? 'pass' : status === 'running' ? 'running' : status === 'pending' ? 'pending' : status.includes('fail') || status === 'blocked' ? 'fail' : status === 'partial' || status === 'timeout' ? 'partial' : 'text-muted'}`);
      if (status === currentStatus) {
        item.style.background = 'rgba(255,255,255,0.15)';
      }
      item.onclick = (e) => {
        e.stopPropagation();
        window.changeStatus(num, status);
        dropdown.remove();
      };
      dropdown.appendChild(item);
    });

    event.target.appendChild(dropdown);

    // Close dropdown when clicking outside
    setTimeout(() => {
      document.addEventListener('click', function closeDropdown() {
        dropdown.remove();
        document.removeEventListener('click', closeDropdown);
      });
    }, 10);
  };

  function renderTimeline(segments, maxWave, events, currentWave) {
    const el = document.getElementById('timeline-content');
    const waves = {};
    segments.forEach(s => { (waves[s.wave] = waves[s.wave] || []).push(s); });

    // Build ordered segment list for j/k navigation
    activeSegList = segments.map(s => s.num);

    let html = '';
    for (let w = 1; w <= maxWave; w++) {
      const segs = waves[w] || [];
      const ws = waveStatus(segs);
      const headerClass = ws === 'active' ? 'active' : ws === 'done' ? 'done' : '';

      html += `<div class="wave-group">`;
      html += `<div class="wave-header ${headerClass}">`;
      html += `<span>Wave ${w}</span><span class="wave-line"></span>`;
      html += `<span>${segs.length} segment${segs.length !== 1 ? 's' : ''}</span>`;
      html += `</div>`;

      segs.forEach(s => {
        const isActive = activeSeg === s.num ? ' active' : '';
        const elapsedStr = s.status === 'running' && s.started_at
          ? `<span class="seg-elapsed">${formatElapsed(Date.now()/1000 - s.started_at)}</span>`
          : '';
        html += `<div class="seg-row${isActive}" data-num="${s.num}" data-status="${s.status}" onclick="window._selectSeg(${s.num},'${s.title.replace(/'/g,"\\'")}','${s.status}')">`;
        html += `<span class="seg-num">S${pad(s.num)}</span>`;
        html += `<span class="seg-title">${s.title}</span>`;
        html += elapsedStr;
        html += `<span class="seg-status ${s.status}" onclick="event.stopPropagation();window.toggleStatusDropdown(event,${s.num},'${s.status}')" title="Click to change status">${s.status}</span>`;
        html += actionButtons(s);
        html += `</div>`;
      });

      // Gate bar after each wave (except last)
      if (w < maxWave) {
        const wDone = ws === 'done';
        const gs = gateStatus(events, w, currentWave, wDone);
        let inner = '';
        if (gs === 'pass') {
          inner = `<span class="gate-icon"><i class="fa-solid fa-check-circle"></i></span><span class="gate-label">Gate</span><span class="gate-badge">passed</span>`;
        } else if (gs === 'fail') {
          inner = `<span class="gate-icon"><i class="fa-solid fa-times-circle"></i></span><span class="gate-label">Gate</span><span class="gate-badge">failed</span>`;
        } else if (gs === 'running') {
          inner = `<span class="gate-icon"><i class="fa-solid fa-spinner fa-spin"></i></span><span class="gate-label">Gate running...</span><div class="gate-progress"><div class="gate-progress-fill"></div></div><span class="gate-badge">building</span>`;
        } else {
          inner = `<span class="gate-icon"><i class="fa-regular fa-circle"></i></span><span class="gate-label">Gate</span><span class="gate-badge">waiting</span>`;
        }
        const clickable = (gs === 'running' || gs === 'pass' || gs === 'fail') ? ` onclick="window._selectGate(${w},'${gs}')" style="cursor:pointer"` : '';
        html += `<div class="gate-bar gate-${gs}"${clickable}>${inner}</div>`;
      }

      html += `</div>`;
    }
    el.innerHTML = html;
  }

  function _resetLogDeltaBufs() {
    _textDeltaBuf = '';
    _thinkDeltaBuf = '';
    _thinkEl = null;
    _pendingTools = [];
  }

  function _openLogStream(url, logEl, isLive) {
    if (logSource) logSource.close();
    _resetLogDeltaBufs();
    logEl.innerHTML = '';
    const badge = document.getElementById('live-badge');
    badge.textContent = isLive ? '● LIVE' : '';
    logSource = new EventSource(url);
    logSource.onmessage = function(e) {
      const event = JSON.parse(e.data);
      appendLogEvent(logEl, event);
      // Once segment completes the server emits _switch_to_log
      if (event.type === '_switch_to_log') badge.textContent = '';
    };
  }

  window._selectGate = function(wave, status) {
    activeSeg = null;
    localStorage.removeItem('orchestrate_activeSeg');
    document.getElementById('log-seg-label').textContent = `Gate — Wave ${wave}`;
    document.getElementById('log-content').innerHTML = '';
    document.querySelectorAll('.seg-row').forEach(r => r.classList.remove('active'));

    // Reset prompt view state
    showingPrompt = false;
    currentPromptText = null;

    // Disable and reset prompt button for gates
    const promptBtn = document.getElementById('prompt-btn');
    if (promptBtn) {
      promptBtn.disabled = true;
      promptBtn.textContent = 'Prompt';
      promptBtn.classList.remove('active');
    }

    _openLogStream(`/api/logs/gate-W${wave}`, document.getElementById('log-content'), status === 'running');
  };

  window.showPrompt = async function() {
    if (activeSeg == null) return;

    const promptBtn = document.getElementById('prompt-btn');
    const logContent = document.getElementById('log-content');
    const badge = document.getElementById('live-badge');

    if (showingPrompt) {
      // Switch back to log view
      showingPrompt = false;
      promptBtn.textContent = 'Prompt';
      promptBtn.classList.remove('active');

      // Resume log stream
      const seg = lastSegments && lastSegments.find(s => s.num === activeSeg);
      if (seg) {
        const status = seg.status;
        _openLogStream(`/api/logs/S${pad(activeSeg)}`, logContent, status === 'running');
      }
    } else {
      // Switch to prompt view
      showingPrompt = true;
      promptBtn.textContent = 'Log';
      promptBtn.classList.add('active');

      // Stop log stream
      if (logSource) {
        logSource.close();
        logSource = null;
      }
      badge.textContent = '';

      // Show loading state
      logContent.innerHTML = '<div style="color: var(--cc-text-dim); padding: 20px;">Loading prompt...</div>';

      // Fetch and display prompt
      try {
        const response = await fetch(`/api/prompt/S${pad(activeSeg)}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const text = await response.text();
        currentPromptText = text;

        // Parse frontmatter and render pills + content using same approach as logs
        const { metadata, content } = _parseYamlFrontmatter(text);
        logContent.innerHTML = '';

        // Add pills if metadata exists
        if (Object.keys(metadata).length > 0) {
          const pillsDiv = document.createElement('div');
          pillsDiv.innerHTML = _renderMetadataPills(metadata);
          pillsDiv.style.padding = '12px 20px 0';
          logContent.appendChild(pillsDiv);
        }

        // Render entire content as markdown
        _appendTextNode(logContent, content, true);
      } catch (e) {
        logContent.innerHTML = `<div style="color: var(--cc-red); padding: 20px;">Failed to load prompt: ${_esc(e.message)}</div>`;
      }
    }
  };

  function updateTokenCostDisplay(segNum) {
    const displayEl = document.getElementById('token-cost-display');
    if (!displayEl) return;

    const seg = lastSegments && lastSegments.find(s => s.num === segNum);
    if (!seg) {
      displayEl.innerHTML = '';
      return;
    }

    // Calculate total tokens and cost from attempts_history
    let totalIn = 0;
    let totalOut = 0;
    let totalCacheRead = 0;
    let totalCacheCreation = 0;
    let totalCost = 0;

    if (seg.attempts_history && seg.attempts_history.length > 0) {
      seg.attempts_history.forEach(att => {
        totalIn += att.tokens_in || 0;
        totalOut += att.tokens_out || 0;
        totalCacheRead += att.cache_read_tokens || 0;
        totalCacheCreation += att.cache_creation_tokens || 0;
        totalCost += att.cost_usd || 0;
      });
    }

    const totalTokens = totalIn + totalOut + totalCacheRead + totalCacheCreation;

    if (totalTokens === 0 && totalCost === 0) {
      displayEl.innerHTML = '';
      return;
    }

    // Format large numbers
    function formatNumber(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toLocaleString();
    }

    let html = '';

    // Show token breakdown if we have it
    if (totalIn > 0 || totalOut > 0) {
      html += `
        <div class="metric">
          <i class="fa-solid fa-coins"></i>
          <span class="value">${formatNumber(totalIn + totalOut)}</span>
          <span style="font-size: 10px;">tok</span>
        </div>
      `;
    }

    // Show cache tokens if significant
    if (totalCacheRead > 0) {
      html += `
        <div class="metric">
          <i class="fa-solid fa-database" style="color: var(--pass);"></i>
          <span class="value">${formatNumber(totalCacheRead)}</span>
          <span style="font-size: 10px;">cached</span>
        </div>
      `;
    }

    // Show cost
    if (totalCost > 0) {
      html += `
        <div class="metric cost">
          <i class="fa-solid fa-dollar-sign"></i>
          <span class="value">${totalCost.toFixed(3)}</span>
        </div>
      `;
    }

    displayEl.innerHTML = html;
  }

  window._selectSeg = function(num, title, status) {
    activeSeg = num;
    localStorage.setItem('orchestrate_activeSeg', num);
    document.getElementById('log-seg-label').textContent = `S${pad(num)} — ${title}`;
    document.getElementById('log-content').innerHTML = '';
    document.querySelectorAll('.seg-row').forEach(r => r.classList.toggle('active', parseInt(r.dataset.num) === num));

    // Reset prompt view state
    showingPrompt = false;
    currentPromptText = null;

    // Enable and reset prompt button
    const promptBtn = document.getElementById('prompt-btn');
    if (promptBtn) {
      promptBtn.disabled = false;
      promptBtn.textContent = 'Prompt';
      promptBtn.classList.remove('active');
    }

    // Enable/disable interject UI based on segment status
    // Allow interject on running segments and failed states (they'll auto-restart)
    const canInterject = ['running', 'failed', 'partial', 'blocked', 'timeout', 'unknown'].includes(status);
    const interjectBtn = document.getElementById('interject-btn');
    const interjectInput = document.getElementById('interject-input');
    if (interjectBtn) {
      interjectBtn.disabled = !canInterject;
    }
    if (interjectInput) {
      interjectInput.disabled = !canInterject;
    }

    // Update token/cost display
    updateTokenCostDisplay(num);

    _openLogStream(`/api/logs/S${pad(num)}`, document.getElementById('log-content'), status === 'running');
  };

  function setupEventStream() {
    eventSource = new EventSource('/api/events');
    const feed = document.getElementById('event-feed');
    eventSource.onmessage = function(e) {
      const ev = JSON.parse(e.data);
      const div = document.createElement('div');
      const svClass = {error:'ev-error', warn:'ev-warn'}[ev.severity] || '';
      div.className = `event-line ${svClass}`;
      div.innerHTML = `<span class="ts">${formatTs(ev.ts)}</span> <span class="kind">${ev.kind}</span> ${ev.detail}`;
      feed.insertBefore(div, feed.firstChild);
      while (feed.children.length > 50) feed.removeChild(feed.lastChild);
    };
  }

  function updateElapsed() {
    if (startedAt) {
      document.getElementById('elapsed').textContent = `Elapsed: ${formatElapsed(Date.now()/1000 - startedAt)}`;
    }
  }

  switchTab('timeline');
  refreshState();
  setInterval(refreshState, 5000);
  setInterval(updateElapsed, 1000);
  setupEventStream();
})();
</script>
</body>
